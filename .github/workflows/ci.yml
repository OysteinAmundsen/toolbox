name: CI

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next
      - "release-please--*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Build and deploy docs site to GitHub Pages"
        required: false
        type: boolean
        default: true
      publish_grid:
        description: "Publish @toolbox-web/grid to npm"
        required: false
        type: boolean
        default: false
      publish_grid_react:
        description: "Publish @toolbox-web/grid-react to npm"
        required: false
        type: boolean
        default: false
      publish_grid_angular:
        description: "Publish @toolbox-web/grid-angular to npm"
        required: false
        type: boolean
        default: false
      publish_grid_vue:
        description: "Publish @toolbox-web/grid-vue to npm"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name ==
    'workflow_dispatch' && 'release' || 'default' }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  # ============================================
  # SETUP: Detect if this is a release-please merge commit
  # ============================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_release_merge: ${{ steps.check.outputs.is_release_merge }}
      should_validate: ${{ steps.check.outputs.should_validate }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          IS_RELEASE_MERGE="false"
          SHOULD_VALIDATE="false"

          # Check if this is a release-please merge commit (main or next)
          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/next" ]]; then
            if [[ "$COMMIT_MSG" == "chore(main): release"* ]] || [[ "$COMMIT_MSG" == "chore(next): release"* ]] || [[ "$COMMIT_MSG" == "chore: release"* ]]; then
              IS_RELEASE_MERGE="true"
              echo "🚀 Detected release-please merge commit - skipping test/build"
            fi
          fi

          # Determine if we should run validation (test/build)
          # Run on: PRs, release-please branches, or regular pushes to main/next (not release merges)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHOULD_VALIDATE="true"
          elif [[ "${{ github.ref }}" == refs/heads/release-please--* ]]; then
            SHOULD_VALIDATE="true"
          elif [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/next" ]] && [[ "$IS_RELEASE_MERGE" == "false" ]]; then
            SHOULD_VALIDATE="true"
          fi

          echo "is_release_merge=$IS_RELEASE_MERGE" >> $GITHUB_OUTPUT
          echo "should_validate=$SHOULD_VALIDATE" >> $GITHUB_OUTPUT

  # ============================================
  # VALIDATION: Test and Build (skipped for release-please merges)
  # ============================================
  test:
    needs: setup
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Set up Nx for affected commands
      - uses: nrwl/nx-set-shas@v4
        id: nx-shas

      - name: Run linting (affected)
        run:
          bun nx affected -t lint --quiet --base=${{ steps.nx-shas.outputs.base }}
          --head=${{ steps.nx-shas.outputs.head }}

      - name: Run tests with coverage (affected)
        run: bun nx affected -t test --exclude='demo-*' --coverage --base=${{
          steps.nx-shas.outputs.base }} --head=${{ steps.nx-shas.outputs.head }}

      - name: Coverage Report - Grid
        if: always() && github.event_name == 'pull_request' &&
          hashFiles('coverage/libs/grid/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Grid
          json-summary-path: coverage/libs/grid/coverage-summary.json
          file-coverage-mode: none
        continue-on-error: true

      - name: Coverage Report - Grid Angular
        if: always() && github.event_name == 'pull_request' &&
          hashFiles('libs/grid-angular/test-output/vitest/coverage/coverage-summary.json')
          != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Grid Angular
          json-summary-path: libs/grid-angular/test-output/vitest/coverage/coverage-summary.json
          file-coverage-mode: none
        continue-on-error: true

      - name: Coverage Report - Grid React
        if: always() && github.event_name == 'pull_request' &&
          hashFiles('libs/grid-react/test-output/vitest/coverage/coverage-summary.json')
          != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Grid React
          json-summary-path: libs/grid-react/test-output/vitest/coverage/coverage-summary.json
          file-coverage-mode: none
        continue-on-error: true

      - name: Coverage Report - Grid Vue
        if: always() && github.event_name == 'pull_request' &&
          hashFiles('coverage/libs/grid-vue/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Grid Vue
          json-summary-path: coverage/libs/grid-vue/coverage-summary.json
          file-coverage-mode: none
        continue-on-error: true

  build:
    needs: setup
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Set up Nx for affected commands
      - uses: nrwl/nx-set-shas@v4
        id: nx-shas

      - name: Build affected libraries
        run: bun nx affected -t build --base=${{ steps.nx-shas.outputs.base }}
          --head=${{ steps.nx-shas.outputs.head }}

      - name: Enforce bundle budgets (affected)
        run:
          bun nx affected -t bundle-check --base=${{ steps.nx-shas.outputs.base }}
          --head=${{ steps.nx-shas.outputs.head }}

      - name: Build size report
        if: always() && hashFiles('dist/libs/grid/index.js') != ''
        run: bun run tools/build-size-report.ts --ci

  # ============================================
  # E2E: Cross-Framework Visual Regression Tests
  # Runs demos against BUILT packages (dist/) to validate releases
  # ============================================
  e2e:
    needs: [setup]
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Disable Nx interactive prompts for CI
      NX_INTERACTIVE: "false"
      NX_DAEMON: "false"
      # Run demos against built dist packages
      USE_DIST: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build libraries
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start demo servers (against dist)
        run: |
          # Demos use USE_DIST=true env to resolve from dist/ instead of source
          bun nx run demo-vanilla:serve:dist &
          bun nx run demo-react:serve:dist &
          bun nx run demo-angular:serve:dist &
          bun nx run demo-vue:serve:dist &
          # Wait for all servers to be ready
          bunx wait-on http://localhost:4000 http://localhost:4300 http://localhost:4200 http://localhost:4100 --timeout 120000

      - name: Run E2E tests
        run: bun run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ============================================
  # BENCH: Vitest microbenchmarks (regression detection)
  # - PR-only comparison. Runs the bench suite TWICE on the same runner:
  #   once on the PR target branch tip (baseline), once on the PR head
  #   (current). Both samples are drawn from the same VM, kernel, thermal
  #   state, and noisy neighbour — eliminating cross-runner variance which
  #   previously caused spurious ±30–60% regression/improvement flips on
  #   each push to `main` (the cached-baseline approach compared runs from
  #   different VMs).
  # - Scoped via `nx affected --with-target=bench`: only projects whose
  #   bench-relevant code (or its dependencies in the Nx graph) changed in
  #   the PR are benched. Docs-only / chore PRs run zero benches and the
  #   job exits early. Single-project PRs skip the other two suites. This
  #   is the primary lever for keeping wall time bounded.
  # - Each affected side is measured **N times** (BENCH_ITERATIONS) and
  #   merged via max-of-N on `hz` (tools/merge-bench-runs.ts). Borrowed
  #   from Netflix's TVUI perf-test methodology: outlier bench results on
  #   shared CI runners are almost always SLOWER than reality (GC,
  #   scheduler, fs cache misses) — never faster — so the fastest of N
  #   runs is the most representative.
  # - On push to `main`/`next`: bench is uploaded as an artifact for
  #   offline trend tracking, but no comparison is performed (no baseline
  #   exists in this model — comparison is always against the PR's own
  #   base). Push runs benches for ALL projects (no affected filtering)
  #   to keep trend artifacts complete and continuous.
  # - Order on PR: baseline runs FIRST so warm-up cost (JIT, fs cache, bun
  #   install side-effects) is paid before measuring the PR head.
  # ============================================
  bench:
    needs: [setup]
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Number of bench iterations per side. Each iteration is a full
      # `vitest bench` run for each AFFECTED project. N=2 is the minimum
      # that supports max-of-N noise filtering; bump back to 3 if the
      # false-positive rate proves unacceptable after a few weeks of data.
      # (Netflix uses 3 across ~50 tests on many devices; we have far
      # fewer benches on a single VM, so diminishing returns kick in
      # earlier.)
      BENCH_ITERATIONS: 2
    steps:
      # Checkout the PR head (or push commit). On pull_request events the
      # default ref is the merge ref refs/pull/X/merge; we explicitly use
      # head.sha so "current" measures the PR branch as authored, not the
      # speculative merge commit. fetch-depth: 0 so we can reach the base
      # commit for the worktree below AND so `nx affected` has full
      # history to compute the diff.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # PR head install runs early because we need `nx` to compute the
      # affected project list before we can decide whether to do anything
      # else. (On push events `nx affected` is not used; we install in
      # the push branch below.)
      - name: Install dependencies (PR head)
        if: github.event_name == 'pull_request'
        run: bun install

      # Compute the bench-targeted projects affected by this PR. Output
      # is a space-separated list (e.g. "grid grid-react") consumed by
      # the loops below. Empty output → skip all bench/compare steps.
      #
      # Workaround for an Nx quirk: when ONLY `sharedGlobals` files
      # (e.g. `.github/workflows/ci.yml`) change in a PR, `nx affected`
      # surfaces the adapters (`grid-{angular,react,vue}`) but NOT the
      # underlying `grid` library — even though the adapters depend on
      # grid. This is internally inconsistent (if the adapters are
      # affected, their dependency must be too) and causes us to silently
      # skip benching the largest surface. We force-include `grid`
      # whenever any of its adapters is in the bench-affected set; this
      # also matches the semantic we actually want (grid + adapter
      # benches change together when shared code moves).
      - name: Detect affected bench projects (PR)
        if: github.event_name == 'pull_request'
        id: affected
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          AFFECTED=$(bun nx show projects --affected --with-target=bench --base "$BASE_SHA" --head "$HEAD_SHA" | tr '\n' ' ' | xargs)
          # Force-include `grid` if an adapter is affected (see comment above).
          case " $AFFECTED " in
            *" grid "*) ;;  # already included
            *" grid-react "*|*" grid-vue "*|*" grid-angular "*)
              AFFECTED="grid $AFFECTED"
              echo "Force-including 'grid' because an adapter is affected (Nx sharedGlobals quirk)."
              ;;
          esac
          AFFECTED=$(echo "$AFFECTED" | xargs)
          echo "Affected bench projects: ${AFFECTED:-(none)}"
          echo "projects=${AFFECTED}" >> "$GITHUB_OUTPUT"
          if [ -z "$AFFECTED" ]; then
            {
              echo "## Bench: skipped";
              echo "";
              echo "No bench-target projects affected by this PR.";
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # PUSH to main/next: bench once across ALL projects (no need for
      # max-of-N when there's no comparison; full project coverage so the
      # trend artifact is continuous), upload artifact only.
      - name: Install dependencies (push)
        if: github.event_name == 'push'
        run: bun install

      - name: Run benchmarks (push, trend artifact only)
        if: github.event_name == 'push'
        run: |
          mkdir -p tmp
          bunx vitest bench --config libs/grid/vite.config.ts --run --outputJson="$PWD/tmp/bench-current-grid.json"
          bunx vitest bench --config libs/grid-react/vite.config.mts --run --outputJson="$PWD/tmp/bench-current-grid-react.json"
          bunx vitest bench --config libs/grid-vue/vite.config.mts --run --outputJson="$PWD/tmp/bench-current-grid-vue.json"
          bun tools/merge-bench-runs.ts \
            --output tmp/bench-current.json \
            tmp/bench-current-grid.json \
            tmp/bench-current-grid-react.json \
            tmp/bench-current-grid-vue.json

      # PR with affected projects: same-runner base vs head comparison.
      # Step 1 — set up a worktree at the base ref. We use a sibling
      # directory so node_modules / dist from the two checkouts don't collide.
      - name: Prepare base worktree (PR)
        if: github.event_name == 'pull_request' && steps.affected.outputs.projects != ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git worktree add ../base "$BASE_SHA"

      # Step 2 — measure BASELINE first so warm-up costs (bun install, fs
      # cache, JIT) are paid before the PR-head measurement. Loop only
      # over affected projects, each measured N times. Output paths are
      # anchored to $GITHUB_WORKSPACE/tmp/ because Vitest resolves
      # --outputJson relative to the config's project root, not the cwd.
      - name: Run baseline benchmarks (PR, ${{ env.BENCH_ITERATIONS }}× iterations × affected projects)
        if: github.event_name == 'pull_request' && steps.affected.outputs.projects != ''
        working-directory: ../base
        env:
          AFFECTED_PROJECTS: ${{ steps.affected.outputs.projects }}
        run: |
          bun install
          mkdir -p "$GITHUB_WORKSPACE/tmp"
          for project in $AFFECTED_PROJECTS; do
            case "$project" in
              grid) CONFIG=libs/grid/vite.config.ts ;;
              grid-react) CONFIG=libs/grid-react/vite.config.mts ;;
              grid-vue) CONFIG=libs/grid-vue/vite.config.mts ;;
              *) echo "::warning::Unknown bench project '$project' — skipping"; continue ;;
            esac
            for i in $(seq 1 $BENCH_ITERATIONS); do
              echo "::group::Baseline $project run $i / $BENCH_ITERATIONS"
              bunx vitest bench --config "$CONFIG" --run --outputJson="$GITHUB_WORKSPACE/tmp/bench-baseline-$project-$i.json"
              echo "::endgroup::"
            done
          done
          # Merge across iterations AND across projects in one pass — the
          # merge script is keyed on group.fullName which already includes
          # the bench file path, so cross-project collisions are impossible
          # and cross-iteration duplicates are reduced via max-hz.
          bun "$GITHUB_WORKSPACE/tools/merge-bench-runs.ts" \
            --output "$GITHUB_WORKSPACE/tmp/bench-baseline.json" \
            "$GITHUB_WORKSPACE"/tmp/bench-baseline-*.json

      # Step 3 — measure CURRENT (deps already installed during the
      # affected-detection step above) with the same N-iteration max-of-N
      # strategy over the same project list.
      - name: Run current benchmarks (PR, ${{ env.BENCH_ITERATIONS }}× iterations × affected projects)
        if: github.event_name == 'pull_request' && steps.affected.outputs.projects != ''
        env:
          AFFECTED_PROJECTS: ${{ steps.affected.outputs.projects }}
        run: |
          for project in $AFFECTED_PROJECTS; do
            case "$project" in
              grid) CONFIG=libs/grid/vite.config.ts ;;
              grid-react) CONFIG=libs/grid-react/vite.config.mts ;;
              grid-vue) CONFIG=libs/grid-vue/vite.config.mts ;;
              *) continue ;;
            esac
            for i in $(seq 1 $BENCH_ITERATIONS); do
              echo "::group::Current $project run $i / $BENCH_ITERATIONS"
              bunx vitest bench --config "$CONFIG" --run --outputJson="$PWD/tmp/bench-current-$project-$i.json"
              echo "::endgroup::"
            done
          done
          bun tools/merge-bench-runs.ts \
            --output tmp/bench-current.json \
            tmp/bench-current-*.json

      - name: Compare against baseline (PR)
        if: github.event_name == 'pull_request' && steps.affected.outputs.projects != ''
        run: |
          bun tools/compare-benches.ts \
            --current tmp/bench-current.json \
            --baseline tmp/bench-baseline.json \
            --threshold 0.25 \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload bench results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bench-results
          path: |
            tmp/bench-current.json
            tmp/bench-baseline.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================
  # RELEASE PLEASE
  # - Runs after test/build/e2e on regular pushes to main
  # - Runs immediately on release-please merges (skips test/build/e2e)
  # - Also runs on release events and workflow_dispatch
  # ============================================
  release-please:
    needs: [setup, test, build, e2e]
    if: |
      always() && !cancelled() &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next') && (
        needs.setup.outputs.is_release_merge == 'true' ||
        (needs.test.result == 'success' && needs.build.result == 'success' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped'))
      ))
    runs-on: ubuntu-latest
    outputs:
      # Grid package outputs
      grid_release_created: ${{ steps.release.outputs['libs/grid--release_created'] }}
      grid_tag_name: ${{ steps.release.outputs['libs/grid--tag_name'] }}
      grid_version: ${{ steps.release.outputs['libs/grid--version'] }}
      # Grid-angular package outputs
      grid_angular_release_created: ${{ steps.release.outputs['libs/grid-angular--release_created'] }}
      grid_angular_tag_name: ${{ steps.release.outputs['libs/grid-angular--tag_name'] }}
      grid_angular_version: ${{ steps.release.outputs['libs/grid-angular--version'] }}
      # Grid-react package outputs
      grid_react_release_created: ${{ steps.release.outputs['libs/grid-react--release_created'] }}
      grid_react_tag_name: ${{ steps.release.outputs['libs/grid-react--tag_name'] }}
      grid_react_version: ${{ steps.release.outputs['libs/grid-react--version'] }}
      # Grid-vue package outputs
      grid_vue_release_created: ${{ steps.release.outputs['libs/grid-vue--release_created'] }}
      grid_vue_tag_name: ${{ steps.release.outputs['libs/grid-vue--tag_name'] }}
      grid_vue_version: ${{ steps.release.outputs['libs/grid-vue--version'] }}
      # Any release created (for jobs that run on any release)
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        if: github.event_name == 'push'
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ============================================
  # RELEASE JOBS (runs on release published, release-please creates a release, or manual workflow_dispatch with release=true)
  # ============================================
  build-docs:
    if: |
      always() && !cancelled() && (
        (github.event_name == 'release' && github.event.release.prerelease != true) ||
        (needs.release-please.outputs.grid_release_created == 'true' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true && github.ref == 'refs/heads/main')
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build docs site
        run: bun nx build docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy-pages:
    if: |
      always() && !cancelled() && (
        (github.event_name == 'release' && github.event.release.prerelease != true) ||
        (needs.release-please.outputs.grid_release_created == 'true' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true && github.ref == 'refs/heads/main')
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [release-please, build-docs]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-grid:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_grid == true)
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

